<svg width="420" height="420" viewBox="0 0 420 420" fill="none" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#05070C"/>
    </radialGradient>

    <!-- Neon green glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft pulse animation -->
    <radialGradient id="eyeGlow">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="1">
        <animate attributeName="stop-opacity" values="1;0.6;1" dur="2.5s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="420" height="420" rx="40" fill="url(#bg)"/>

  <!-- Terminal frame -->
  <rect x="70" y="90" width="280" height="220" rx="18"
        fill="#0B1220" stroke="#1F2937" stroke-width="1.5"/>

  <!-- Terminal header -->
  <rect x="70" y="90" width="280" height="40" rx="18" fill="#0A0F1C"/>
  <circle cx="95" cy="110" r="5" fill="#EF4444"/>
  <circle cx="115" cy="110" r="5" fill="#F59E0B"/>
  <circle cx="135" cy="110" r="5" fill="#22C55E"/>

  <!-- Eye glow background -->
  <circle cx="210" cy="200" r="70" fill="url(#eyeGlow)" opacity="0.6"/>

  <!-- Eye outline -->
  <path d="M210 160C150 160 110 200 110 200C110 200 150 240 210 240C270 240 310 200 310 200C310 200 270 160 210 160Z"
        stroke="#22C55E" stroke-width="5" fill="none" filter="url(#glow)"/>

  <!-- Pupil -->
  <circle cx="210" cy="200" r="18" fill="#22C55E" filter="url(#glow)">
    <animate attributeName="r" values="18;22;18" dur="2.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Scan lines -->
  <line x1="130" y1="200" x2="290" y2="200" stroke="#22C55E" stroke-opacity="0.25"/>
  <line x1="150" y1="185" x2="270" y2="185" stroke="#22C55E" stroke-opacity="0.15"/>
  <line x1="150" y1="215" x2="270" y2="215" stroke="#22C55E" stroke-opacity="0.15"/>

  <!-- Title -->
  <text x="210" y="370" text-anchor="middle"
        font-size="30" fill="#22C55E"
        font-family="monospace" font-weight="700"
        letter-spacing="3">
    SENTINEL
  </text>

</svg>